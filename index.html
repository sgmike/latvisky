<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#9E1B1F" />
  <title>Latvisky — A2 letón en 40 días</title>
  <meta name="description" content="Tu plan personalizado para aprobar el examen A2 de letón en 40 días." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="vendor/tailwind.js"></script>
  <script src="vendor/marked.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lvred: { DEFAULT: '#9E1B1F', dark: '#7d1518', light: '#c63035' },
            ink: { 900: '#0b1020', 800: '#121a32', 700: '#1c2545' }
          },
          fontFamily: {
            sans: ['system-ui', 'Inter', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-ink-900 text-slate-100 min-h-screen pb-24 antialiased">

  <!-- TOP BAR -->
  <header class="sticky top-0 z-30 bg-ink-900/80 backdrop-blur border-b border-white/5">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-2">
      <a href="#/" class="flex items-center gap-2 group">
        <div class="w-8 h-8 rounded-md bg-gradient-to-br from-lvred to-lvred-dark flex items-center justify-center font-bold text-white shadow-lg shadow-lvred/30">L</div>
        <div class="leading-tight">
          <div class="font-bold text-base">Latvisky</div>
          <div class="text-[10px] text-slate-400 -mt-0.5">A2 letón · 40 días</div>
        </div>
      </a>
      <div class="flex items-center gap-2">
        <div id="streak-pill" class="hidden sm:flex items-center gap-1.5 text-xs bg-amber-500/10 text-amber-300 border border-amber-500/20 rounded-full px-3 py-1.5">
          <span>🔥</span><span id="streak-count">0</span><span class="opacity-80">días</span>
        </div>
        <a href="#/profiles" id="profile-pill" class="hidden flex items-center gap-1.5 text-xs bg-white/5 hover:bg-white/10 border border-white/10 rounded-full pl-1 pr-3 py-1">
          <span id="profile-avatar" class="w-6 h-6 rounded-full bg-gradient-to-br from-lvred to-lvred-dark flex items-center justify-center text-[10px] font-bold text-white">—</span>
          <span id="profile-name" class="font-medium max-w-[8rem] truncate">—</span>
          <svg class="w-3 h-3 opacity-60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="app" class="max-w-3xl mx-auto px-4 py-6 min-h-[60vh]">
    <div class="animate-pulse text-center py-20 text-slate-500">Cargando…</div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 inset-x-0 bg-ink-800/95 backdrop-blur border-t border-white/10 z-40">
    <div class="max-w-3xl mx-auto grid grid-cols-5">
      <a href="#/" data-tab="home" class="nav-tab">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12L12 4l9 8M5 10v10h14V10"/></svg>
        <span>Inicio</span>
      </a>
      <a href="#/days" data-tab="days" class="nav-tab">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Días</span>
      </a>
      <a href="#/cards" data-tab="cards" class="nav-tab">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="14" height="14" rx="2"/><path d="M7 9h6M7 13h6M7 17h4"/><rect x="7" y="3" width="14" height="2" rx="1"/></svg>
        <span>Cards</span>
      </a>
      <a href="#/quiz" data-tab="quiz" class="nav-tab">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></svg>
        <span>Quiz</span>
      </a>
      <a href="#/me" data-tab="me" class="nav-tab">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>
        <span>Yo</span>
      </a>
    </div>
  </nav>

  <script src="js/content.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
